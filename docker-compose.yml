version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: pos_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pos_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/pos_auth_db
      - JWT_SECRET=supersecret_jwt_sign_key_change_in_production_12345
      - JWT_EXPIRE=24h
      - COOKIE_EXPIRE=24
      - CLIENT_URL=http://localhost:5173
    depends_on:
      - mongodb
    restart: always

volumes:
  mongo_data:
